services:
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      backend:
        condition: service_started
    environment:
      NEXT_PUBLIC_SIGNAL_WS_URL: ${NEXT_PUBLIC_SIGNAL_WS_URL:-ws://localhost:8000/ws/signals}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      WATCHPACK_POLLING: ${WATCHPACK_POLLING:-true}
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app/frontend
      - frontend_node_modules:/app/frontend/node_modules
      - frontend_next:/app/frontend/.next

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      ENABLE_MOCK_SIGNALS: ${ENABLE_MOCK_SIGNALS:-true}
      PYTHONUNBUFFERED: "1"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data

  signal-daemon:
    build:
      context: .
      dockerfile: signal-daemon/Dockerfile
    depends_on:
      backend:
        condition: service_started
    environment:
      TELEGRAM_ENABLED: ${TELEGRAM_ENABLED:-false}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
      SIGNAL_JSONL_PATH: /app/data/signals.jsonl
      PYTHONUNBUFFERED: "1"
    volumes:
      - ./signal-daemon:/app/signal-daemon
      - ./data:/app/data

volumes:
  frontend_node_modules:
  frontend_next:
