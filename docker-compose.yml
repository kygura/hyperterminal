services:
  frontend:
    # Local development only. Production frontend deploys to Vercel.
    build:
      context: .
      dockerfile: frontend/Dockerfile
    depends_on:
      backend:
        condition: service_started
    environment:
      NEXT_PUBLIC_SIGNAL_WS_URL: ${NEXT_PUBLIC_SIGNAL_WS_URL:-ws://localhost:8000/ws/signals}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      WATCHPACK_POLLING: ${WATCHPACK_POLLING:-true}
      NEXT_TELEMETRY_DISABLED: "1"
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      - ./frontend:/app/frontend
      - frontend_node_modules:/app/frontend/node_modules
      - frontend_next:/app/frontend/.next

  backend:
    # Local development only. Production backend uses deploy/docker-compose.prod.yml.
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      PYTHONUNBUFFERED: "1"
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    volumes:
      - ./backend:/app/backend
      - ./data:/app/data

volumes:
  frontend_node_modules:
  frontend_next:
