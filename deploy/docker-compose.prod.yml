services:
  backend:
    build:
      context: ..
      dockerfile: backend/Dockerfile
    env_file:
      - ./.env.production
    environment:
      SIGNAL_DB_PATH: ${SIGNAL_DB_PATH:-/data/data.db}
      BRANCHES_DB_PATH: ${BRANCHES_DB_PATH:-/data/data.db}
      NEWS_DB_PATH: ${NEWS_DB_PATH:-/data/data.db}
      BRANCHES_YAML_DIR: ${BRANCHES_YAML_DIR:-/data/branches}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      LOG_FILE: ${LOG_FILE:-/logs/backend.log}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS}
      PRICE_UPDATE_INTERVAL_SECONDS: ${PRICE_UPDATE_INTERVAL_SECONDS:-300}
    volumes:
      - /srv/hypertrade/data:/data
      - /srv/hypertrade/logs:/logs
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health', timeout=5).read()",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  caddy:
    image: caddy:2.10
    depends_on:
      backend:
        condition: service_healthy
    env_file:
      - ./.env.production
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  caddy_data:
  caddy_config:
