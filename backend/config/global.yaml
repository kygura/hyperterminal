assets:
  - BTC
  - ETH

database:
  path: data.db

strategy:
  timeframe: hourly

polling:
  # Hyperliquid REST
  funding_poll_seconds: 3600
  context_poll_seconds: 300
  trade_ws_enabled: true

  # Supplemental REST data
  bybit_ohlcv_seconds: 3600      # hourly candles
  bybit_oi_seconds: 3600         # hourly OI
  bybit_volume_seconds: 3600     # hourly spot volume

telegram:
  bot_token: "${TELEGRAM_BOT_TOKEN}"
  chat_id: "${TELEGRAM_CHAT_ID}"

alerts:
  cooldown_seconds: 3600
  telegram_min_interval_seconds: 10

engine:
  tick_interval_seconds: 3600
  signal_refresh_enabled: true
  signal_refresh_debounce_seconds: 2.0

confluence:
  thresholds:
    low: 1
    medium: 2
    high: 3

health_check:
  interval_seconds: 21600        # 6 hours

price_history:
  cutoff_date: "2026-04-01T00:00:00+00:00"
  hydration_timeframes:
    - 1h
    - 4h
    - 1d
